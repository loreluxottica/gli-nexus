<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLI Nexus — Single View</title>
  <meta name="description" content="GLI Nexus — Single View: un prodotto GLI alla volta a tutta schermata, si scorre su richiesta.">

  <!-- Favicon: il monolite GLI (forma del master mark, GLI blue) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Cpath d='M18 18 L62 18 L78 34 L78 78 L34 78 L18 62 Z' fill='%232F5EFF'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Sora:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/single.css">
  <link rel="stylesheet" href="css/gate.css">
</head>
<body class="nexus-single">

  <!-- ============================================================
       GATE — identità di apertura (condiviso con index.html).
       ============================================================ -->
  <div class="gate" id="gate" role="dialog" aria-modal="true" aria-label="Enter GLI Nexus">
    <canvas id="gateCanvas" aria-hidden="true"></canvas>
    <div class="gate-vignette" aria-hidden="true"></div>
    <div class="gate-flash" aria-hidden="true"></div>
    <div class="gate-noise" aria-hidden="true"></div>

    <div class="gate-content">
      <div class="gate-signature">
        <img class="gate-mark" src="GLI-Branding/assets/web/gli-monolite.png"
             alt="" width="2731" height="2731">
        <h1 class="gate-word">GLI</h1>
      </div>
      <p class="gate-sub">Group Logistics <span>Intelligence</span></p>

      <button class="gate-cta" id="gateOpen" type="button">
        <span class="gate-cta-glow" aria-hidden="true"></span>
        <span class="gate-cta-label">Open Nexus</span>
        <span class="gate-cta-chev" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5 10.5 8 6 12.5"/></svg>
        </span>
      </button>

      <div class="gate-endorse">
        <span class="gate-endorse-label">part of</span>
        <img class="gate-endorse-logo" src="GLI-Branding/assets/essilorluxottica-logo-white.png"
             alt="EssilorLuxottica" width="579" height="63">
      </div>
    </div>
  </div>

  <!-- ============================================================
       NEXUS APP — Single View: un prodotto alla volta.
       ============================================================ -->
  <div class="nexus-app" id="nexusApp" aria-hidden="true" inert>

    <canvas id="worldCanvas" aria-hidden="true"></canvas>
    <div class="warp-flash" id="warpFlash" aria-hidden="true"></div>
    <div class="world-scanlines" aria-hidden="true"></div>
    <div class="world-vignette" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <div class="single-stage" id="singleStage">

      <!-- Header costante: lockup identità GLI Nexus -->
      <header class="worlds-head">
        <div class="wordmark wordmark--small" aria-label="GLI Nexus">
          <img class="wordmark-mark" src="GLI-Branding/assets/web/gli-monolite.png" alt="" width="96" height="96">
          GLI <span>Nexus</span>
        </div>

        <nav class="category-filter" id="categoryFilter" aria-label="Filter products by category">
          <button class="category-toggle is-active" type="button" data-category="all" aria-pressed="true">All</button>
          <button class="category-toggle" type="button" data-category="ai" aria-pressed="false">AI</button>
          <button class="category-toggle" type="button" data-category="analytics" aria-pressed="false">Analytics</button>
          <button class="category-toggle" type="button" data-category="reporting" aria-pressed="false">Reporting</button>
        </nav>
      </header>

      <!-- Hero: il prodotto attivo -->
      <div class="hero" id="hero">
        <p class="hero-eyebrow">Nexus Worlds</p>

        <div class="hero-logo-wrap">
          <span class="hero-backlight" aria-hidden="true"></span>
          <img class="hero-logo" id="heroLogo" src="GLI-Branding/assets/web/gli-cortana.png"
               alt="" width="512" height="512">
        </div>

        <h1 class="hero-name" id="heroName" tabindex="-1">Cort<span>ana</span></h1>

        <div class="hero-cta-wrap" id="heroCtaWrap">
          <a class="cta hero-cta" id="heroCta" href="#">
            <span class="cta-chev" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5 10.5 8 6 12.5"/></svg>
            </span>
            <span class="cta-label" id="heroCtaLabel">Open Cortana</span>
          </a>
          <div class="cta-menu" id="heroCtaMenu" role="menu" aria-hidden="true" hidden></div>
        </div>

        <p class="sr-only" id="worldLive" aria-live="polite"></p>
      </div>

      <!-- Controlli di navigazione: pulsanti prev/next + contatore + dot -->
      <div class="single-controls">
        <button class="nav-btn" id="singlePrev" type="button" aria-label="Previous product">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
        </button>

        <div class="single-meter">
          <span class="single-counter" id="singleCounter" aria-hidden="true">01 / 06</span>
          <div class="single-dots" id="singleDots"></div>
        </div>

        <button class="nav-btn" id="singleNext" type="button" aria-label="Next product">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Footer sottile: endorsement EssilorLuxottica -->
      <footer class="worlds-foot">
        <img class="worlds-foot-logo" src="GLI-Branding/assets/essilorluxottica-logo-white.png"
             alt="EssilorLuxottica" width="579" height="63">
      </footer>

    </div>

  </div>

  <script src="js/worlds-data.js"></script>
  <script src="js/worlds-bg.js"></script>
  <script src="js/access.js"></script>
  <script src="js/single.js"></script>
  <script src="js/gate-bg.js"></script>
  <script src="js/gate.js"></script>
</body>
</html>
