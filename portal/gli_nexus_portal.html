<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLI Nexus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Syncopate:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#00d2f5}
body{background:#050810;min-height:100vh;font-family:'Inter',sans-serif;overflow:hidden;position:relative}

/* =========================================================  INTRO  */
#intro{position:fixed;inset:0;z-index:50;background:#050810;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background-color 1.3s ease .5s}
#intro.go{background-color:transparent;pointer-events:none}
.intro-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,150,210,.13) 0%,transparent 60%);animation:breathe 5s ease-in-out infinite;transition:opacity .4s ease}
#intro.go .intro-glow{opacity:0}
@keyframes breathe{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}
.intro-title{font-family:'Syncopate',sans-serif;font-weight:700;font-size:46px;letter-spacing:14px;color:#fff;text-transform:uppercase;text-indent:14px;transform-origin:center center;will-change:transform,opacity;transition:transform 1.15s cubic-bezier(.65,0,.2,1),opacity .4s ease 1.1s;position:relative;z-index:1}
.intro-title .x{color:var(--accent)}
#intro.go .intro-title{transform:translateY(calc(-50vh + 52px)) scale(0.28);opacity:0}
.intro-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:18px;text-indent:6px;transition:opacity .3s ease}
.intro-cta{margin-top:64px;display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadepulse 2.4s ease-in-out infinite;transition:opacity .3s ease}
#intro.go .intro-sub,#intro.go .intro-cta{opacity:0}
@keyframes fadepulse{0%,100%{opacity:.45}50%{opacity:1}}
.intro-cta span{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.65);text-transform:uppercase;text-indent:5px}
.intro-ring{width:46px;height:46px;border:1px solid rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.intro-ring::before{content:'';position:absolute;inset:-1px;border-radius:50%;border:1px solid transparent;border-top-color:var(--accent);animation:spin 2.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.intro-arrow{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:9px solid rgba(255,255,255,.7);margin-left:3px}

/* =========================================================  BG  */
#bg{position:fixed;inset:0;z-index:0;opacity:0;background-size:cover;background-position:center;filter:blur(38px) saturate(1.3) brightness(.6);transform:scale(1.2);transition:opacity 1.4s ease}
#bg.on{opacity:.85}
#bg-tint{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at 50% 38%,transparent 0%,rgba(5,8,16,.5) 60%,rgba(5,8,16,.92) 100%);pointer-events:none}

/* =========================================================  PORTAL  */
.portal{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-height:100vh;padding:34px 24px 26px;opacity:0;transition:opacity .9s ease}
.portal.in{opacity:1}
.brand{opacity:0;transition:opacity .7s ease}
.brand.show{opacity:1}
.brand .btext{font-family:'Syncopate',sans-serif;font-weight:400;font-size:13px;letter-spacing:6px;color:rgba(255,255,255,.92);text-transform:uppercase;text-indent:6px}
.brand .btext b{font-weight:700;color:var(--accent);transition:color .8s}

/* =========================================================  COVERFLOW  */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;perspective:1600px}
.flow{position:relative;width:100%;max-width:760px;height:300px;transform-style:preserve-3d}

/* Outer card — coverflow position */
.card{position:absolute;top:50%;left:50%;width:178px;height:250px;border-radius:18px;cursor:pointer;transform-origin:center center;transition:transform .6s cubic-bezier(.25,.8,.25,1),opacity .6s,box-shadow .6s,filter .6s}

/* ---- HOVER on side cards ---- */
.card[data-pos="-1"]:hover,.card[data-pos="1"]:hover{filter:brightness(.82)}
.card[data-pos="-2"]:hover,.card[data-pos="2"]:hover{filter:brightness(.55)}
.card[data-pos="-1"]:hover .card-tilt::after,
.card[data-pos="1"]:hover  .card-tilt::after{border-color:rgba(255,255,255,.3);box-shadow:0 0 22px rgba(255,255,255,.14)}
/* ---- HOVER on center card: hint overlay ---- */
.card[data-pos="0"] .flip-hint{opacity:0;transition:opacity .25s ease}
.card[data-pos="0"]:hover .flip-hint{opacity:1}
.card[data-pos="0"].flipped .flip-hint{opacity:0 !important}

/* Tilt wrapper — JS applies rotateX/Y here */
.card-tilt{position:relative;width:100%;height:100%;border-radius:18px;transform-style:preserve-3d;transition:transform .12s ease}
/* border lives on tilt so it follows the 3D tilt */
.card-tilt::after{content:'';position:absolute;inset:0;border-radius:18px;border:1px solid rgba(255,255,255,.08);transition:border-color .5s,box-shadow .5s;pointer-events:none;z-index:10}
.card[data-pos="0"] .card-tilt::after{border-color:var(--card-accent,rgba(255,255,255,.5));box-shadow:0 0 35px var(--card-glow,rgba(255,255,255,.25)),inset 0 0 22px rgba(0,0,0,.15)}

/* Flip inner — rotateY for the flip */
.card-inner{position:absolute;inset:0;border-radius:18px;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}

/* Faces */
.card-front,.card-back{position:absolute;inset:0;border-radius:18px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.card-front img{width:100%;height:100%;object-fit:cover;display:block}
.card-back{transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:20px 18px}
.card-back .back-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:2px;color:#fff;text-align:center;line-height:1.5;margin-bottom:10px}
.card-back .back-desc{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.5px;color:rgba(255,255,255,.45);text-align:center;line-height:1.6;margin-bottom:18px}
.card-back .back-date{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:1px;color:rgba(255,255,255,.28);margin-bottom:20px}
.card-back .back-btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;padding:7px 16px;border-radius:20px;border:1px solid currentColor;background:transparent;cursor:pointer;text-transform:uppercase;transition:background .2s,color .2s}
.card-back .back-btn:hover{background:rgba(255,255,255,.15)}
.card-back .back-btn--soon{opacity:.4;cursor:not-allowed;color:rgba(255,255,255,.5) !important}
.card-back .back-btn:disabled{pointer-events:none}
.card-back .back-btn--soon:hover{background:transparent}

/* Hover flip hint overlay */
.flip-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
.flip-hint span{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,.55);text-transform:uppercase;background:rgba(0,0,0,.45);padding:4px 10px;border-radius:10px}

/* Fan positions */
.card[data-pos="0"] {transform:translate(-50%,-50%) translateZ(60px) scale(1.18);z-index:5;opacity:1;box-shadow:0 30px 70px rgba(0,0,0,.6)}
.card[data-pos="-1"]{transform:translate(-50%,-50%) translateX(-168px) translateY(34px) translateZ(-40px) rotateY(28deg) rotateZ(-7deg) scale(.86);z-index:4;opacity:.78;filter:brightness(.62)}
.card[data-pos="1"] {transform:translate(-50%,-50%) translateX(168px)  translateY(34px) translateZ(-40px) rotateY(-28deg) rotateZ(7deg)  scale(.86);z-index:4;opacity:.78;filter:brightness(.62)}
.card[data-pos="-2"]{transform:translate(-50%,-50%) translateX(-300px) translateY(78px) translateZ(-140px) rotateY(34deg) rotateZ(-13deg) scale(.72);z-index:3;opacity:.45;filter:brightness(.42)}
.card[data-pos="2"] {transform:translate(-50%,-50%) translateX(300px)  translateY(78px) translateZ(-140px) rotateY(-34deg) rotateZ(13deg)  scale(.72);z-index:3;opacity:.45;filter:brightness(.42)}

/* Pre-reveal */
.card.pre{transform:translate(-50%,-50%) translateY(120px) scale(0.55) !important;opacity:0 !important;filter:blur(14px) brightness(.25) !important;box-shadow:none !important}

/* nowinfo */
.nowinfo{margin-top:34px;text-align:center;min-height:54px}
.nowinfo .name{font-size:21px;font-weight:400;color:#fff;letter-spacing:.3px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
.nowinfo .tag {font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-top:7px;opacity:0;transform:translateY(8px);transition:opacity .5s .08s,transform .5s .08s,color .8s}
.nowinfo.show .name,.nowinfo.show .tag{opacity:1;transform:translateY(0)}
.dots{display:flex;gap:9px;margin-top:24px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .4s}
.dot.active{width:22px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.footer{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:1.5px;text-align:center;font-family:'JetBrains Mono',monospace}
.hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.22);letter-spacing:2px;z-index:3;font-family:'JetBrains Mono',monospace;animation:hf 3s ease-in-out infinite}
@keyframes hf{0%,100%{opacity:.2}50%{opacity:.5}}
</style>
</head>

let sel = 0;
const flow    = document.getElementById('flow');
const dotsEl  = document.getElementById('dots');
const bg      = document.getElementById('bg');
const nowinfo = document.getElementById('nowinfo');
const nowName = document.getElementById('now-name');
const nowTag  = document.getElementById('now-tag');
const intro   = document.getElementById('intro');
const portal  = document.getElementById('portal');
const brand   = document.getElementById('brand');

// Build cards
DATA.forEach((d, i) => {
  const c = document.createElement('div');
  c.className = 'card pre';

  // back face HTML
  const backStyle = `background:linear-gradient(145deg,rgba(5,8,16,.95),rgba(10,15,30,.98));`;
  c.innerHTML = `
    <div class="card-tilt">
      <div class="card-inner">
        <div class="card-front"><img src="data:image/jpeg;base64,${d.img}" alt="${d.name}"></div>
        <div class="card-back" style="${backStyle}">
          <div style="width:28px;height:2px;background:${d.accent};border-radius:2px;margin-bottom:16px;opacity:.8"></div>
          <div class="back-name">${d.name}</div>
          <div class="back-desc">${d.desc}</div>
          <div class="back-date">${d.tag}</div>
          ${!d.link
            ? `<button class="back-btn back-btn--soon" disabled>Coming soon</button>`
            : d.project
              ? `<button class="back-btn back-btn--soon" disabled>Access restricted</button>`
              : `<button class="back-btn" style="color:${d.accent}">Open Dashboard</button>`}
        </div>
      </div>
    </div>
    <div class="flip-hint"><span>click to flip</span></div>`;

  c.addEventListener('click', () => handleCardClick(i, c));
  const btn = c.querySelector('.back-btn');
  if (d.link && !d.project) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();          // don't trigger card flip
      window.location.href = d.link; // same tab
    });
  }
  flow.appendChild(c);
  d._el   = c;
  d._tilt = c.querySelector('.card-tilt');
  d._inner = c.querySelector('.card-inner');

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => select(i));
  dotsEl.appendChild(dot);
  d._dot = dot;
});

// ── Access gating ────────────────────────────────────────────────────────
// Gated cards ship with a disabled "Access restricted" button; the server
// tells us which projects this user may open ("*" = all) and we upgrade
// those buttons in place. Fetch failure keeps everything restricted.
fetch('api/my-access')
  .then(r => r.ok ? r.json() : {projects: []})
  .then(({projects}) => {
    const all = projects.includes('*');
    DATA.forEach(d => {
      if (!d.link || !d.project) return;
      if (!all && !projects.includes(d.project)) return;
      const btn = d._el.querySelector('.back-btn');
      btn.className = 'back-btn';
      btn.style.color = d.accent;
      btn.textContent = 'Open Dashboard';
      btn.disabled = false;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        window.location.href = d.link;
      });
    });
  })
  .catch(() => {});

function handleCardClick(i, el) {
  if (el.classList.contains('pre')) return;
  if (i !== sel) {
    // side card: bring it to center (click to move across the tiles)
    DATA[sel]._el.classList.remove('flipped');
    select(i);
  } else {
    // center card: flip to reveal the back (Open Dashboard / Coming soon)
    el.classList.toggle('flipped');
  }
}

function select(i) {
  // unflip previous center card
  if (i !== sel) DATA[sel]._el.classList.remove('flipped');
  sel = i;
  DATA.forEach((d, j) => {
    let p = j - i;
    if (p >  2) p -= DATA.length;
    if (p < -2) p += DATA.length;
    d._el.setAttribute('data-pos', p);
    if (p === 0) {
      d._el.style.setProperty('--card-accent', d.accent);
      d._el.style.setProperty('--card-glow',   d.glow);
    }
    d._dot.classList.toggle('active', j === i);
  });
  const cur = DATA[i];
  document.documentElement.style.setProperty('--accent', cur.accent);
  bg.style.backgroundImage = 'url(data:image/jpeg;base64,' + cur.img + ')';
  bg.classList.add('on');
  nowinfo.classList.remove('show');
  void nowinfo.offsetWidth;
  nowName.textContent = cur.name;
  nowTag.textContent  = cur.tag;
  nowinfo.classList.add('show');
}

// ---- 3D tilt on center card hover ----
flow.addEventListener('mousemove', e => {
  const d = DATA[sel];
  if (!d._tilt || d._el.classList.contains('pre')) return;
  const rect = d._el.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const nx = (mx / rect.width  - 0.5) * 2; // -1 to 1
  const ny = (my / rect.height - 0.5) * 2;
  // Only apply when hovering near center card
  if (mx >= 0 && mx <= rect.width && my >= 0 && my <= rect.height) {
    const rx =  ny * 9;
    const ry = -nx * 9;
    d._tilt.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    d._tilt.style.transition = 'transform .08s ease';
  }
});

flow.addEventListener('mouseleave', resetTilt);
// also reset when pointer leaves center card area
document.addEventListener('pointermove', e => {
  const d = DATA[sel];
  if (!d._el) return;
  const rect = d._el.getBoundingClientRect();
  if (e.clientX < rect.left || e.clientX > rect.right ||
      e.clientY < rect.top  || e.clientY > rect.bottom) resetTilt();
});
function resetTilt() {
  DATA[sel]._tilt.style.transform = '';
  DATA[sel]._tilt.style.transition = 'transform .4s ease';
}

// ---- Cascade reveal ----
function revealCascade() {
  DATA.forEach((d, j) => {
    let p = j;
    if (p >  2) p -= DATA.length;
    if (p < -2) p += DATA.length;
    d._el.setAttribute('data-pos', p);
    if (p === 0) {
      d._el.style.setProperty('--card-accent', DATA[0].accent);
      d._el.style.setProperty('--card-glow',   DATA[0].glow);
    }
    d._dot.classList.toggle('active', j === 0);
  });
  // Reveal center-out (pos 0, then ±1, then ±2) so every card leaves .pre,
  // whatever DATA.length is.
  const pos = j => { let p = j; if (p > 2) p -= DATA.length; if (p < -2) p += DATA.length; return p; };
  const revealOrder = DATA.map((_, j) => j)
    .sort((a, b) => (Math.abs(pos(a)) - Math.abs(pos(b))) || (pos(b) - pos(a)));
  revealOrder.forEach((di, step) => {
    setTimeout(() => {
      DATA[di]._el.style.transition = 'transform 1.2s cubic-bezier(.15,.7,.1,1),opacity 1.1s ease,filter 1s ease,box-shadow .8s';
      DATA[di]._el.classList.remove('pre');
    }, step * 200);
  });
  setTimeout(() => { DATA.forEach(d => { d._el.style.transition = ''; }); }, 2200);
}

// ---- Intro ----
let started = false;
function start() {
  if (started) return;
  started = true;
  bg.style.backgroundImage = 'url(data:image/jpeg;base64,' + DATA[0].img + ')';
  bg.classList.add('on');
  document.documentElement.style.setProperty('--accent', DATA[0].accent);
  intro.classList.add('go');
  setTimeout(() => { portal.classList.add('in'); }, 350);
  setTimeout(() => { brand.classList.add('show'); }, 1300);
  nowName.textContent = DATA[0].name;
  nowTag.textContent  = DATA[0].tag;
  setTimeout(() => { nowinfo.classList.add('show'); }, 1400);
  setTimeout(() => { revealCascade(); }, 700);
  setTimeout(() => { intro.style.display = 'none'; }, 1800);
}

intro.addEventListener('click', start);
document.addEventListener('keydown', e => {
  if (!started && (e.key === 'Enter' || e.key === ' ')) { start(); return; }
  if (!started) return;
  if (e.key === 'ArrowRight') select((sel + 1) % DATA.length);
  if (e.key === 'ArrowLeft')  select((sel - 1 + DATA.length) % DATA.length);
  if (e.key === 'Escape')     DATA[sel]._el.classList.remove('flipped');
});

let sx = null;
flow.addEventListener('pointerdown', e => { sx = e.clientX; });
window.addEventListener('pointerup', e => {
  if (sx === null) return;
  const dx = e.clientX - sx;
  if (Math.abs(dx) > 40) {
    DATA[sel]._el.classList.remove('flipped');
    if (dx < 0) select((sel + 1) % DATA.length);
    else         select((sel - 1 + DATA.length) % DATA.length);
  }
  sx = null;
});
</script>
