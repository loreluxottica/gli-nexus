# Databricks App — GLI Nexus
# Single process: gunicorn serves the WSGI dispatcher (portal + mounted projects).
# Databricks Apps expect the process to listen on port 8000.
command:
  - gunicorn
  - app:application
  - --bind
  - 0.0.0.0:8000
  - --workers
  - "1"
  - --threads
  - "8"
  - --timeout
  - "120"

env:
  - name: KELLY_DATA_SOURCE
    value: "delta"
  - name: KELLY_UC_SCHEMA
    value: "sbx-logistics.kelly"     # per-warehouse tables mapped in warehouses.py
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"       # app resource key (SQL warehouse, "Can use")
  - name: MAPBOX_TOKEN
    valueFrom: "mapbox-token"        # app resource key -> secret kelly/mapbox_token
  - name: MAPBOX_STYLE
    value: "mapbox://styles/eyetechroomradar/cljwwv07z026501pk33kp1g93"
