# Databricks App — GLI Nexus
# Single process: gunicorn serves the WSGI dispatcher (portal + mounted projects).
# Databricks Apps expect the process to listen on port 8000.
command:
  - gunicorn
  - app:application
  - --bind
  - 0.0.0.0:8000
  - --workers
  - "1"
  - --threads
  - "8"
  - --timeout
  - "120"

env:
  - name: KELLY_DATA_SOURCE
    value: "delta"
  - name: KELLY_WAREHOUSE_COLUMN
    value: "Warehouse"
  # Fill/uncomment once the real table and app resources exist.
  # Empty/missing values keep the app on generated mock data.
  # - name: KELLY_TABLE
  #   value: "catalog.schema.absenteeism"
  # - name: DATABRICKS_WAREHOUSE_ID
  #   valueFrom: "sql-warehouse"     # app resource key (SQL warehouse)
  # - name: MAPBOX_TOKEN
  #   valueFrom: "mapbox-token"      # app resource key (secret)
